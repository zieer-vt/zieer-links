<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZIEER — links</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
      background: #0a1520;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 18px 36px;
      overflow-x: hidden;
      position: relative;
    }

    /* ── video overlay tint ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        to bottom,
        rgba(10, 20, 40, 0.35) 0%,
        rgba(10, 20, 40, 0.20) 40%,
        rgba(10, 20, 40, 0.45) 100%
      );
      pointer-events: none;
    }

    /* ── video background ── */
    #bg-video {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    /* ── name header ── */
    .header {
      position: relative;
      z-index: 3;
      text-align: center;
      margin-bottom: 20px;
    }
    .header-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #e8f0f8;
      letter-spacing: 5px;
      text-shadow: 0 0 20px rgba(168,204,236,0.7), 0 2px 8px rgba(0,0,0,0.5);
    }
    .header-sub {
      font-size: 0.68rem;
      color: #a8ccec;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 2px;
      font-style: italic;
      text-shadow: 0 1px 6px rgba(0,0,0,0.4);
    }

    /* ── bento grid ── */
    .grid {
      position: relative;
      z-index: 3;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: auto;
      gap: 12px;
      width: 100%;
      max-width: 500px;
    }

    /* ── base card ── */
    .card {
      border-radius: 22px;
      overflow: hidden;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: transform 0.28s cubic-bezier(.34,1.56,.64,1), box-shadow 0.25s;
      box-shadow: 0 4px 18px rgba(60,90,130,0.15), 0 1px 3px rgba(60,90,130,0.1);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .card:hover {
      transform: translateY(-5px) scale(1.03);
      box-shadow: 0 14px 36px rgba(60,90,130,0.25), 0 2px 8px rgba(60,90,130,0.15);
    }
    .card:active { transform: scale(0.97); }

    /* grid placements */
    .card-tiktok   { grid-column: 1 / 3; grid-row: 1; min-height: 150px; }
    .card-ig       { grid-column: 3 / 4; grid-row: 1; min-height: 150px; }
    .card-discord  { grid-column: 1 / 2; grid-row: 2; min-height: 140px; }
    .card-fb       { grid-column: 2 / 4; grid-row: 2; min-height: 140px; }
    .card-yt       { grid-column: 1 / 4; grid-row: 3; min-height: 120px; }
    .card-kofi     { grid-column: 1 / 4; grid-row: 4; min-height: 100px; }

    /* ── card inner content ── */
    .card-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .card-body {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 14px 16px;
      height: 100%;
      background: linear-gradient(to top, rgba(0,0,0,0.32) 0%, transparent 60%);
    }
    .card-label-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-icon {
      width: 30px;
      height: 30px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .card-icon svg { width: 16px; height: 16px; fill: white; }
    .card-info {}
    .card-platform {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.75);
      line-height: 1;
    }
    .card-handle {
      font-size: 0.92rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.3px;
      line-height: 1.2;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    /* arrow badge */
    .card-arrow {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 2;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(255,255,255,0.28);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: white;
      transition: background 0.2s;
    }
    .card:hover .card-arrow { background: rgba(255,255,255,0.45); }

    /* ── TikTok card ── */
    .card-tiktok .card-bg {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a1a4e 100%);
    }
    .card-tiktok .card-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle 60px at 75% 35%, rgba(255,0,80,0.25) 0%, transparent 70%),
        radial-gradient(circle 80px at 80% 40%, rgba(0,242,234,0.2) 0%, transparent 70%);
    }
    .tiktok-deco {
      position: absolute;
      z-index: 1;
      top: 12px;
      left: 16px;
      font-size: 2.2rem;
      opacity: 0.18;
      pointer-events: none;
    }
    .tiktok-note {
      position: absolute;
      z-index: 1;
      font-size: 1.1rem;
      opacity: 0.35;
      animation: float-note 4s ease-in-out infinite;
      pointer-events: none;
    }
    .note1 { top: 18px; right: 55px; animation-delay: 0s; }
    .note2 { top: 30px; right: 35px; animation-delay: 1.5s; font-size: 0.8rem; }
    @keyframes float-note {
      0%,100%{ transform: translateY(0) rotate(-10deg); opacity:0.35; }
      50%{ transform: translateY(-6px) rotate(5deg); opacity:0.55; }
    }
    .tiktok-icon-bg { background: linear-gradient(135deg, #010101, #2a2a2a); }

    /* ── Instagram card ── */
    .card-ig .card-bg {
      background: linear-gradient(160deg, #833ab4 0%, #fd1d1d 50%, #fcb045 100%);
    }
    .card-ig .card-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle 70px at 60% 30%, rgba(255,255,255,0.15) 0%, transparent 70%);
    }
    .ig-icon-bg { background: linear-gradient(135deg, #833ab4, #fd1d1d); }

    /* ── Discord card ── */
    .card-discord .card-bg {
      background: linear-gradient(160deg, #3c4a9a 0%, #5865f2 50%, #7289da 100%);
    }
    .card-discord .card-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle 60px at 40% 30%, rgba(255,255,255,0.12) 0%, transparent 70%);
    }
    .discord-icon-bg { background: rgba(88,101,242,0.7); }

    /* ── Facebook card ── */
    .card-fb .card-bg {
      background: linear-gradient(135deg, #1877f2 0%, #0d5bbf 40%, #1a3a6e 100%);
    }
    .card-fb .card-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 100px 80px at 80% 20%, rgba(255,255,255,0.14) 0%, transparent 70%);
    }
    .fb-deco {
      position: absolute;
      z-index: 1;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 3.5rem;
      opacity: 0.1;
      pointer-events: none;
      color: white;
    }
    .fb-icon-bg { background: rgba(24,119,242,0.7); }

    /* ── YouTube card ── */
    .card-yt .card-bg {
      background: linear-gradient(135deg, #1a0a0a 0%, #3a0a0a 40%, #c4302b 100%);
    }
    .card-yt .card-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 120px 80px at 80% 50%, rgba(255,80,60,0.25) 0%, transparent 70%),
        radial-gradient(circle 60px at 20% 50%, rgba(255,255,255,0.07) 0%, transparent 70%);
    }
    .yt-play {
      position: absolute;
      z-index: 1;
      right: 22px;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .yt-play svg { width: 20px; height: 20px; fill: white; margin-left: 3px; }
    .yt-icon-bg { background: rgba(196,48,43,0.8); }

    /* ── Ko-fi card ── */
    .card-kofi .card-bg {
      background: linear-gradient(135deg, #1a0d00 0%, #8B3A00 40%, #FF6B35 100%);
    }
    .card-kofi .card-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 120px 80px at 80% 50%, rgba(255,180,80,0.25) 0%, transparent 70%),
        radial-gradient(circle 50px at 20% 50%, rgba(255,255,255,0.07) 0%, transparent 70%);
    }
    .kofi-deco {
      position: absolute;
      z-index: 1;
      right: 70px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2.8rem;
      opacity: 0.15;
      pointer-events: none;
    }
    .kofi-icon-bg { background: rgba(255,107,53,0.75); }

    /* ── footer ── */
    .footer {
      position: relative;
      z-index: 3;
      margin-top: 16px;
      font-size: 0.65rem;
      color: #a8ccec;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.7;
    }

    /* ── floating particles on bg ── */
    .particles { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      animation: drift linear infinite;
    }
    @keyframes drift {
      0%   { transform: translate(0,0) scale(0); opacity: 0; }
      10%  { opacity: 0.8; transform: translate(0, -5px) scale(1); }
      100% { transform: translate(var(--tx), -60vh) scale(0.3); opacity: 0; }
    }

    /* ── music toggle button ── */
    #music-btn {
      position: fixed;
      bottom: 22px;
      right: 22px;
      z-index: 10;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.35);
      background: rgba(20, 40, 70, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, background 0.2s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }
    #music-btn:hover { transform: scale(1.12); background: rgba(30,60,100,0.7); }
    #music-btn svg   { width: 18px; height: 18px; fill: rgba(255,255,255,0.9); transition: opacity 0.3s; }
    #music-btn.playing { border-color: rgba(168,204,236,0.6); }
    #music-btn.playing svg { animation: pulse-icon 1.8s ease-in-out infinite; }
    @keyframes pulse-icon { 0%,100%{opacity:0.7} 50%{opacity:1} }

    /* sound wave bars when playing */
    .bars {
      display: none;
      align-items: flex-end;
      gap: 2px;
      height: 16px;
    }
    .bars span {
      width: 3px;
      border-radius: 2px;
      background: rgba(255,255,255,0.85);
      animation: bar-bounce 0.8s ease-in-out infinite;
    }
    .bars span:nth-child(1){ height: 6px;  animation-delay: 0s; }
    .bars span:nth-child(2){ height: 12px; animation-delay: 0.15s; }
    .bars span:nth-child(3){ height: 8px;  animation-delay: 0.3s; }
    .bars span:nth-child(4){ height: 14px; animation-delay: 0.1s; }
    @keyframes bar-bounce {
      0%,100%{ transform: scaleY(0.4); } 50%{ transform: scaleY(1); }
    }
    #music-btn.playing .note-icon { display: none; }
    #music-btn.playing .bars      { display: flex; }

    /* responsive */
    @media (max-width: 380px) {
      .grid { gap: 9px; }
      .card-tiktok { min-height: 130px; }
      .card-ig     { min-height: 130px; }
      .card-discord{ min-height: 120px; }
      .card-fb     { min-height: 120px; }
      .card-kofi   { min-height: 88px; }
      .card-handle { font-size: 0.82rem; }
    }
  </style>
</head>

<p class="footer">✦ zieer · chrono archive ✦</p>

<!-- music toggle -->
<button id="music-btn" title="Toggle music" aria-label="Toggle ambient music">
  <svg class="note-icon" viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
  <div class="bars">
    <span></span><span></span><span></span><span></span>
  </div>
</button>

<script>
// ── ambient music engine ──────────────────────────────
const btn = document.getElementById('music-btn');
let ctx = null, master = null, playing = false, loopTimer = null;

// A minor dreamy chords — [root, third, fifth, octave]
const CHORDS = [
  [110.00, 130.81, 164.81, 220.00],   // Am  A2 C3 E3 A3
  [87.307, 110.00, 130.81, 174.61],   // F   F2 A2 C3 F3
  [130.81, 164.81, 196.00, 261.63],   // C   C3 E3 G3 C4
  [98.000, 123.47, 146.83, 196.00],   // G   G2 B2 D3 G3
];
const BELLS = [523.25,659.25,783.99,880.00,1046.5,1318.5]; // C5 E5 G5 A5 C6 E6

function makeReverb(c) {
  const len = c.sampleRate * 2.5;
  const buf = c.createBuffer(2, len, c.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++)
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.8);
  }
  const cv = c.createConvolver(); cv.buffer = buf; return cv;
}

function playPad(freq, t, dur, vol, reverb) {
  const osc  = ctx.createOscillator();
  const env  = ctx.createGain();
  const filt = ctx.createBiquadFilter();
  osc.type = 'sine';
  osc.frequency.value = freq;
  filt.type = 'lowpass'; filt.frequency.value = 800; filt.Q.value = 0.5;
  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(vol, t + dur * 0.25);
  env.gain.setValueAtTime(vol, t + dur * 0.7);
  env.gain.linearRampToValueAtTime(0, t + dur);
  osc.connect(filt); filt.connect(env); env.connect(reverb); env.connect(master);
  osc.start(t); osc.stop(t + dur + 0.1);
}

function playBell(freq, t, reverb) {
  const osc = ctx.createOscillator();
  const env = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  env.gain.setValueAtTime(0.06, t);
  env.gain.exponentialRampToValueAtTime(0.0001, t + 3.5);
  osc.connect(env); env.connect(reverb); env.connect(master);
  osc.start(t); osc.stop(t + 4);
}

function scheduleLoop() {
  const reverb = makeReverb(ctx);
  reverb.connect(master);
  const now = ctx.currentTime + 0.1;
  const step = 7; // seconds per chord

  CHORDS.forEach((chord, ci) => {
    const t = now + ci * step;
    chord.forEach(f => playPad(f, t, step + 1.5, 0.045, reverb));
  });

  // scatter bell sparkles across the cycle
  const total = CHORDS.length * step;
  for (let i = 0; i < 6; i++) {
    const bt = now + Math.random() * total;
    const bf = BELLS[Math.floor(Math.random() * BELLS.length)];
    playBell(bf, bt, reverb);
  }

  loopTimer = setTimeout(scheduleLoop, (total - 1) * 1000);
}

function startMusic() {
  ctx    = new (window.AudioContext || window.webkitAudioContext)();
  master = ctx.createGain();
  master.gain.value = 0.55;
  master.connect(ctx.destination);
  scheduleLoop();
}

function stopMusic() {
  clearTimeout(loopTimer);
  if (master) { master.gain.linearRampToValueAtTime(0, ctx.currentTime + 1.2); }
  setTimeout(() => { ctx && ctx.close(); ctx = null; master = null; }, 1400);
}

btn.addEventListener('click', () => {
  playing = !playing;
  btn.classList.toggle('playing', playing);
  playing ? startMusic() : stopMusic();
});
// ─────────────────────────────────────────────────────

// floating particles
const container = document.getElementById('particles');
function spawn() {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = Math.random() * 4 + 2;
  const dur  = Math.random() * 10 + 8;
  const tx   = (Math.random() - 0.5) * 80;
  p.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%;
    bottom:${Math.random()*30}%;
    --tx:${tx}px;
    animation-duration:${dur}s;
    animation-delay:${Math.random()*8}s;
    opacity:0;
  `;
  container.appendChild(p);
  setTimeout(() => p.remove(), (dur + 8) * 1000);
}
for (let i = 0; i < 14; i++) spawn();
setInterval(spawn, 900);
</script>
</body>
